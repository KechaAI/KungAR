<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR เกมธรรมะ: ตะกร้าแห่งความดี</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    
    <style>
        body { 
            text-align: center; 
            font-family: 'Tahoma', 'Leelawadee', sans-serif; 
            background-color: #f0f8ff; 
            margin: 0;
            padding: 10px;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        h1 { color: #2E7D32; font-size: 1.3rem; margin: 5px 0; }
        p { font-size: 0.85rem; margin: 0 0 10px 0; color: #555; }
        
        canvas { 
            display: block;
            margin: 0 auto;
            max-width: 100%; 
            height: auto !important; 
            border: 3px solid #4CAF50; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
        }
    </style>
</head>
<body>

    <h1>เกม AR: จับความดีใส่ตะกร้า</h1>
    <p>ใช้นิ้วแตะที่ลูกบอลความดีบนหน้าจอ แล้วลากลงตะกร้าบุญ!</p>
    
    <script>
        let video;
        let score = 0;
        
        // วัตถุความดี
        let goodDeed = { x: 200, y: 60, size: 80, text: "แบ่งปัน", isCaught: false };
        // ตะกร้าบุญ
        let basket = { x: 110, y: 410, w: 180, h: 90 };

        function setup() {
            createCanvas(400, 520);
            textFont('Tahoma'); 
            
            // เรียกเปิดกล้องหน้า
            let constraints = {
                video: {
                    facingMode: 'user',
                    width: { ideal: 400 },
                    height: { ideal: 520 }
                },
                audio: false
            };
            
            video = createCapture(constraints);
            video.size(width, height);
            video.hide(); 
        }

        function draw() {
            // วาดภาพกล้องหน้าแบบกระจกเงาด้านหลังวัตถุ
            push();
            translate(width, 0);
            scale(-1, 1);
            image(video, 0, 0, width, height);
            pop();

            // วาดตะกร้าบุญ
            fill(255, 193, 7, 220);
            rect(basket.x, basket.y, basket.w, basket.h, 15);
            fill(0);
            textSize(22);
            textAlign(CENTER, CENTER);
            text("ตะกร้าบุญ", basket.x + basket.w/2, basket.y + basket.h/2);

            // แสดงคะแนน
            fill(255);
            stroke(0);
            strokeWeight(4);
            textSize(24);
            textAlign(LEFT, TOP);
            text("คะแนนบุญ: " + score, 20, 20);
            noStroke(); 

            // ลอจิกควบคุมการลากและการหล่น
            if (goodDeed.isCaught) {
                // ถ้าใช้นิ้วลาก ให้ตำแหน่งเคลื่อนที่ตามนิ้ว (รองรับทั้งเมาส์และทัชสกรีน)
                goodDeed.x = mouseX;
                goodDeed.y = mouseY;

                // ตรวจสอบว่าลากลงตะกร้าหรือยัง
                if (goodDeed.x > basket.x && goodDeed.x < basket.x + basket.w && 
                    goodDeed.y > basket.y && goodDeed.y < basket.y + basket.h) {
                    score += 10;
                    resetGoodDeed();
                }
            } else {
                // ถ้าไม่มีใครจับ ให้ร่วงลงมาเรื่อยๆ
                goodDeed.y += 4; 
                if (goodDeed.y > height) { 
                    resetGoodDeed();
                }
            }

            // วาดลูกบอลความดี
            fill(76, 175, 80, 230);
            ellipse(goodDeed.x, goodDeed.y, goodDeed.size);
            fill(255);
            textSize(18);
            textAlign(CENTER, CENTER);
            text(goodDeed.text, goodDeed.x, goodDeed.y);
        }

        // เช็คการจิ้มหรือทัชหน้าจอโดนลูกบอล
        function mousePressed() {
            let d = dist(mouseX, mouseY, goodDeed.x, goodDeed.y);
            if (d < goodDeed.size / 2) {
                goodDeed.isCaught = true;
            }
        }

        // เมื่อปล่อยนิ้ว
        function mouseReleased() {
            goodDeed.isCaught = false;
        }

        // ฟังก์ชันสุ่มตำแหน่งและคำศัพท์ใหม่
        function resetGoodDeed() {
            let words = ["แบ่งปัน", "เมตตา", "ซื่อสัตย์", "กตัญญู", "ให้อภัย", "พูดความจริง"];
            goodDeed.text = random(words); // สุ่มคำศัพท์ธรรมะใหม่ไปเลยเพื่อความสนุก
            goodDeed.isCaught = false;
            goodDeed.y = 60;
            goodDeed.x = random(50, width - 50);
        }
    </script>
</body>
</html>
