<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR เกมธรรมะ: ตะกร้าแห่งความดี</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
    
    <style>
        body { 
            text-align: center; 
            font-family: 'Tahoma', 'Leelawadee', sans-serif; 
            background-color: #f0f8ff; 
            margin: 0;
            padding: 10px;
            overflow: hidden;
        }
        h1 { color: #2E7D32; font-size: 1.3rem; margin: 5px 0; }
        p { font-size: 0.85rem; margin: 0 0 10px 0; color: #555; }
        
        /* ปรับเฟรมหน้าจอเกมให้พอดีกับโทรศัพท์มือถือ */
        canvas { 
            display: block;
            margin: 0 auto;
            max-width: 100%; 
            height: auto !important; 
            border: 3px solid #4CAF50; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
        }
    </style>
</head>
<body>

    <h1>เกม AR: จับความดีใส่ตะกร้า</h1>
    <p id="status">กำลังโหลดระบบ AI กล้องหน้า... โปรดรอสักครู่</p>
    
    <script>
        let video;
        let handpose;
        let predictions = [];
        let score = 0;
        let isModelLoaded = false;
        
        let goodDeed = { x: 200, y: 60, size: 75, text: "แบ่งปัน", isCaught: false };
        let basket = { x: 110, y: 410, w: 180, h: 90 };

        function setup() {
            // สร้าง Canvas ขนาดแนวตั้งเหมาะกับจอมือถือ
            createCanvas(400, 520);
            textFont('Tahoma'); 
            
            // ตั้งค่าบังคับเปิดกล้องหน้า (facingMode: 'user')
            let constraints = {
                video: {
                    facingMode: 'user',
                    width: { ideal: 400 },
                    height: { ideal: 520 }
                },
                audio: false
            };
            
            video = createCapture(constraints, function(stream) {
                console.log("เปิดกล้องหน้าสำเร็จ");
            });
            video.size(width, height);
            video.hide(); 

            // เรียกใช้งาน Handpose Model
            handpose = ml5.handpose(video, modelReady);
            handpose.on("predict", results => { predictions = results; });
        }

        function modelReady() {
            console.log("โมเดล AI โหลดเสร็จสิ้น!");
            isModelLoaded = true;
            // เปลี่ยนข้อความบอกผู้เล่นเมื่อระบบพร้อม
            document.getElementById("status").innerText = "ยกนิ้วชี้ขึ้นมาส่องกล้อง แล้วลากคำศัพท์ลงตะกร้าบุญ";
        }

        function draw() {
            // กลับด้านภาพกล้องหน้าเพื่อให้เป็นกระจกเงา (เล่นง่าย ไม่สับสนซ้ายขวา)
            push();
            translate(width, 0);
            scale(-1, 1);
            image(video, 0, 0, width, height);
            pop();

            // วาดตะกร้าบุญ
            fill(255, 193, 7, 220);
            rect(basket.x, basket.y, basket.w, basket.h, 15);
            fill(0);
            textSize(22);
            textAlign(CENTER, CENTER);
            text("ตะกร้าบุญ", basket.x + basket.w/2, basket.y + basket.h/2);

            // แสดงคะแนนบุญ
            fill(255);
            stroke(0);
            strokeWeight(4);
            textSize(24);
            textAlign(LEFT, TOP);
            text("คะแนนบุญ: " + score, 20, 20);
            noStroke(); 

            // ถ้า AI ยังโหลดไม่เสร็จ จะยังไม่ปล่อยวัตถุลงมา
            if (!isModelLoaded) return;

            // ลอจิกการหล่นของลูกบอลความดี
            if (!goodDeed.isCaught) {
                goodDeed.y += 3.5; 
                if (goodDeed.y > height) { 
                    goodDeed.y = 60; 
                    goodDeed.x = random(50, width - 50); 
                }
            }

            // วาดลูกบอลความดี
            fill(76, 175, 80, 230);
            ellipse(goodDeed.x, goodDeed.y, goodDeed.size);
            fill(255);
            textSize(18);
            textAlign(CENTER, CENTER);
            text(goodDeed.text, goodDeed.x, goodDeed.y);

            // เมื่อกล้องตรวจจับเจอตำแหน่งมือ
            if (predictions.length > 0) {
                let indexFinger = predictions[0].annotations.indexFinger[3];
                // คำนวณพิกัดให้ตรงกับการกลับด้านแบบกระจกเงา
                let handX = width - indexFinger[0]; 
                let handY = indexFinger[1];

                // วาดเป้าเล็งสีแดงที่ปลายนิ้วชี้ของผู้เล่น
                fill(244, 67, 54);
                ellipse(handX, handY, 20, 20);

                // ตรวจสอบว่านิ้วชี้ชนกับลูกบอลความดีหรือไม่
                if (!goodDeed.isCaught) {
                    let d = dist(handX, handY, goodDeed.x, goodDeed.y);
                    if (d < goodDeed.size / 2) {
                        goodDeed.isCaught = true;
                    }
                }
                
                // ถ้านิ้วจับลูกบอลอยู่ ให้วัตถุเคลื่อนที่ตามนิ้วมือ
                if (goodDeed.isCaught) {
                    goodDeed.x = handX;
                    goodDeed.y = handY;
                    
                    // ตรวจสอบเงื่อนไขเมื่อลากลูกบอลมาใส่ในตะกร้าบุญ
                    if (handX > basket.x && handX < basket.x + basket.w && 
                        handY > basket.y && handY < basket.y + basket.h) {
                        score += 10;
                        goodDeed.isCaught = false;
                        goodDeed.y = 60;
                        goodDeed.x = random(50, width - 50);
                    }
                }
            } else {
                // หากผู้เล่นเอามือออกจากรัศมีกล้อง ให้ปล่อยวัตถุร่วงลงตามแรงโน้มถ่วง
                goodDeed.isCaught = false;
            }
        }
    </script>
</body>
</html>
